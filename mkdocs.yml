  #     如果你同意,你可以帮助我们让我们的网站更好

plugins:
  - search #搜索配置
  - git-committers:
      enabled: !ENV [CI, false]
      repository: Gongzihang6/Gongzihang6.github.io
      branch: main
      exclude:
        - index.md

  - document-dates:
      position: bottom            # 显示位置：top（标题后） bottom（文档末尾），默认：bottom
      type: date               # 时间类型：date datetime timeago，默认：date
      locale: zh               # 本地化语言：en zh zh_TW es fr de ar ja ko ru，默认：en
      date_format: '%Y-%m-%d'  # 日期格式化字符串，例如：%Y年%m月%d日、%b %d, %Y
      time_format: '%H:%M:%S'  # 时间格式化字符串（仅在 type=datetime 时有效）
      exclude:                 # 排除文件列表，默认为空
        - index.md             # 首页不显示文档日期
      show_author: true        # 是否显示作者信息，默认：true


  - blog: #博客配置
      post_date_format: full #时间
      draft: true
      draft_if_future_date: true #自动将具有未来日期的帖子标记为草稿
      post_readtime: true
      post_readtime_words_per_minute: 265 #计算帖子的阅读时间时读者每分钟预计阅读的字数
      post_url_format: "{date}/{slug}"
      pagination_url_format: "page/{page}"
      authors_file: "{blog}/.authors.yml" #作者信息
  - tags

markdown_extensions: #详见https://squidfunk.github.io/mkdocs-material/setup/extensions/python-markdown-extensions/ 和 https://squidfunk.github.io/mkdocs-material/setup/extensions/python-markdown/
  - abbr
  - attr_list
  - admonition
  - def_list
  - footnotes
  - md_in_html
  - meta
  - pymdownx.caret
  - pymdownx.betterem
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.snippets
  - pymdownx.smartsymbols
  - pymdownx.tilde




  - toc:
      permalink: true # 固定标题位置为当前位置
  - pymdownx.highlight: # 代码块高亮
      anchor_linenums: true
      linenums: true # 显示行号
      linenums_style: "table"
      auto_title: true # 显示编程语言名称
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.arithmatex: # latex支持
      generic: true
      block_syntax:
        - dollar  # 用于 $$...$$
        - begin_end # 用于 \begin{}...\end{}
  - pymdownx.superfences:
      custom_fences:
        - name: math
          class: arithmatex
          format: !!python/name:pymdownx.arithmatex.fence_mathjax_format

        - name: raw_html
          class: raw-html


        - name: mermaid
          class: mermaid
          format:
            !!python/name:pymdownx.superfences.fence_code_format # 代码块高亮插件

extra_javascript:
  - javascripts/extra.js
  - javascripts/config_mathjax.js  # 仅在存在公式内容时按需加载 MathJax
extra_css:
  - stylesheets/extra.css
  - stylesheets/extra2.css
  - stylesheets/customize.css # 搜索圆角优化
hooks:
  - scripts/mkdocs_hooks/socialmedia.py
  - scripts/mkdocs_hooks/reading_time.py
  - scripts/mkdocs_hooks/ai_summary.py

